<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Twimba</title>
  </head>
  <body>
    <main class="main-body">
      <header class="main-header">
        <!-- <img src="./images/main-logo.png" alt="Twimba Logo" class="main-logo" /> -->
        <h1 class="logo-text">TWIMBA</h1>
      </header>
      <div class="twimba-container">
        <div class="tweetArea-container">
          <div class="tweetArea">
            <img src="./images/main-logo.png" alt="" />
            <textarea
              name="textarea"
              id="tweetText"
              placeholder="What's going on?"
            ></textarea>
          </div>
          <button id="tweetButton" class="tweetButton">Tweet</button>
        </div>
        <hr />
      </div>
    </main>
    <script src="index.js" type="module"></script>
  </body>
</html>
